<!DOCTYPE html>
<html><head>
    <title>🏆 Masterpiece Soccer Championship</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        body { margin: 0; background: linear-gradient(135deg,#1a2a3a,#2d4b4b,#3a5a5a); font-family: 'Orbitron'; display: flex; flex-direction: column; align-items: center; padding: 10px; }
        #championship { background: linear-gradient(145deg,#141a1f,#202834); border: 3px solid #ffd700; border-radius: 25px; padding: 20px; box-shadow: 0 12px 36px rgba(0,0,0,0.8); margin: 10px; }
        .header { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 20px; margin-bottom: 15px; }
        .team-banner { background: linear-gradient(145deg,#111,#333); border: 2px solid #444; border-radius: 15px; padding: 15px; text-align: center; box-shadow: 0px 4px 12px rgba(0,0,0,0.5); }
        .team-score { color: #ffd700; font-size: 32px; font-weight: bold; text-shadow: 0 0 15px #ffd700; }
        .match-time { color: #ffaa00; font-size: 24px; font-weight: bold; font-family: 'Orbitron'; }
        #gameCanvas { background: linear-gradient(135deg,#1e3a1e,#2a5a2a,#3a7a3a); border: 4px solid #ffd700; border-radius: 25px; }
        .difficulty-panel { display: flex; gap: 8px; justify-content: center; margin: 15px 0; }
        .champ-button { padding: 12px 18px; border: 2px solid #ffd700; background: transparent; color: white; cursor: pointer; border-radius: 20px; font-weight: bold; transition: all 0.4s; }
        .champ-button.active, .champ-button:hover { background: #ffd700; color: #0f1923; transform: translateY(-2px) scale(1.05); }
    </style>
</head><body>
<div id="championship">
 <div class="header">
  <div class="team-banner"><div class="team-name">🏆 Player Championship</div><div class="team-score" id="score1">0</div></div>
  <div class="match-center"><div class="match-time" id="timer">90"</div></div>
  <div class="team-banner"><div class="team-name">🤖 Elite AI Formation</div><div class="team-score" id="score2">0</div></div>
 </div>
 <div class="difficulty-panel">
  <button class="champ-button active" onclick="setDifficulty('easy')">🏖️ Casual</button>
  <button class="champ-button" onclick="setDifficulty('medium')">🎯 Professional</button>
  <button class="champ-button" onclick="setDifficulty('hard')">💀 Elite</button>
  <button class="champ-button" onclick="resetChampionship()">🔁 New Match</button>
 </div>
 <canvas id="gameCanvas" width="800" height="400"></canvas>
 <div style="color: white; text-align: center; margin: 10px; font-size: 12px;">
  WASD: Move | Q: Champion Shot (6) | E: Precision (2) | Formation: Dynamic AI<br>
  FPS: <span id="fps">60</span> | Ball Physics: Elite | Formation: Strategic (NOT chase)
 </div>
</div>

<script>
class MasterpieceSoccer {
    constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.setupEliteChampionship();
    }

    setupEliteChampionship() {
        this.constants = {FIELD_WIDTH: 800, FIELD_HEIGHT: 400, GOAL_WIDTH: 120, PLAYER_SIZE: 13, BALL_SIZE: 8, FRICTION: 0.985};
        
        // Ultra-strategic formation system - NOT ball-chasing
        this.championship = {
            timeLeft: 90, difficulty: 'easy', scores: {player: 0, ai: 0}, status: 'ACTIVE'
        };

        this.formationAI = {
 easy: {speed: 2.0, accuracy: 0.7, aggression: 0.4, formations: 'relaxed'},
 medium: {speed: 2.8, accuracy: 0.85, aggression: 0.7, formations: 'strategic'},
 hard: {speed: 3.5, accuracy: 0.95, aggression: 0.95, formations: 'elite'}
        };

        this.initializeEliteAthletics();
        this.setupEliteControls();
        this.startMasterpieceEngine();
    }

    initializeEliteAthletics() {
        // Champion athletes with formation roles
        this.eliteAthletes = [
            {
                x: 200, y: 200, vx: 0, vy: 0, speed: 4.5,
                color: '#ff4444', team: 'player', role: 'champion'
            },
            {
                x: 580, y: 130, vx: 0, vy: 0, speed: 3.0,
                color: '#4444ff', role: 'striker', formationTarget: {x: 620, y: 120}
            },
            {
                x: 520, y: 190, vx: 0, vy: 0, speed: 3.3,
                color: '#6666ff', role: 'support', formationTarget: {x: 550, y: 180}
            },
            {
                x: 480, y: 280, vx: 0, vy: 0, speed: 2.7,
                color: '#8888ff', role: 'defender', formationTarget: {x: 500, y: 260}
            }
        ];

        this.masterpieceBall = {
            x: 400, y: 200, vx: 0, vy: 0, spin: 0, lastContact: null
        };

        this.controlKeys = {};
    }

    setupEliteControls() {
        onkeydown = (e) => {
            this.controlKeys[e.code.toLowerCase()] = true;
            if (e.code.toLowerCase() === 'space') this.resetChampionship();
        };
        onkeyup = (e) => this.controlKeys[e.code.toLowerCase()] = false;
    }

    // ELITE FORMATION AI - NOT ball-chasing
    calculateFormationStrategy(ai, ball, playerInCharge) {
        const currentAI = this.formationAI[this.championship.difficulty];
        
        // REAL soccer positioning system
        const formations = {
 defensive_formation: {
                striker: { target: {x: 550, y: ball.y}, intensity: 0.6, priority: 'containment', description: "Screens striker space" },
                support: { target: {x: 500, y: ball.y + 40}, intensity: 0.7, priority: 'interception', description: "Creates midfield barrier" },
                defender: { target: {x: 450, y: 200}, intensity: 1.0, priority: 'defensive_anchor', description: "Professional defensive coverage" }
            },
 attacking_formation: {
                striker: { target: {x: 650, y: ball.y}, intensity: 0.8, priority: 'through_run', description: "Elite attacking positioning" },
                support: { target: {x: 590, y: ball.y - 25}, intensity: 0.7, priority: 'wing_support', description: "Tactical creation of space" },
                defender: { target: {x: 530, y: ball.y + 20}, intensity: 0.5, priority: 'safety_net', description: "Professional defensive safety" }
            }
        };

        const formationPhase = playerInCharge ? 'defensive_formation' : 'attacking_formation';
        return formations[formationPhase][ai.role];
    }

    // Elite formation movement
    updateFormationAI() {
        const ball = this.masterpieceBall;
        const playerHasBall = ball.x < this.constants.FIELD_WIDTH / 2;
        
        this.eliteAthletes.slice(1).forEach((ai, index) => {
            const strategy = this.calculateFormationStrategy(ai, ball, playerHasBall);
            const dx = strategy.target.x - ai.x;
            const dy = strategy.target.y - ai.y;
            const distance = Math.sqrt(dx * dx + dy * dy);

            if (distance > 4) {
                const baseSpeed = this.formationAI[this.championship.difficulty].speed;
                ai.vx = (dx / distance) * baseSpeed * strategy.intensity;
                ai.vy = (dy / distance) * baseSpeed * strategy.intensity;
            } else {
                ai.vx *= 0.85; ai.vy *= 0.85; // Professional positioning
            }

            ai.x = Math.max(this.constants.PLAYER_SIZE, Math.min(this.constants.FIELD_WIDTH - this.constants.PLAYER_SIZE, ai.x));
            ai.y = Math.max(this.constants.PLAYER_SIZE, Math.min(this.constants.FIELD_HEIGHT - this.constants.PLAYER_SIZE, ai.y));
        });
    }

    // Elite soccer physics
    applyElitePhysics() {
        this.masterpieceBall.x += this.masterpieceBall.vx;
        this.masterpieceBall.y += this.masterpieceBall.vy;
        this.masterpieceBall.vx *= this.constants.FRICTION;
        this.masterpieceBall.vy *= this.constants.FRICTION;

        const
