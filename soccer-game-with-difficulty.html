<!DOCTYPE html>
<html>
<head>
 <title>Soccer Game</title>
 <style>
 body {
 margin: 0;
 background: #0a4d0a;
 font-family: Arial, sans-serif;
 display: flex;
 flex-direction: column;
 align-items: center;
 padding: 20px;
 }
 
 #gameContainer {
 border: 2px solid white;
 border-radius: 10px;
 }
 
 #gameInfo {
 color: white;
 text-align: center;
 margin-bottom: 10px;
 font-size: 18px;
 }
 
 #controls {
 color: white;
 text-align: center;
 margin-bottom: 5px;
 font-size: 14px;
 }
 
 #instructions {
 color: #ccc;
 text-align: center;
 margin-top: 10px;
 font-size: 12px;
 }
 
 #difficulty-selector {
 color: white;
 text-align: center;
 margin-bottom: 5px;
 }
 
 .difficulty-btn {
 margin: 0 5px;
 padding: 5px 10px;
 border: 1px solid white;
 background: transparent;
 color: white;
 cursor: pointer;
 border-radius: 3px;
 }
 
 .difficulty-btn.active {
 background: #444;
 }
 
 #performance {
 color: white;
 margin-top: 10px;
 font-size: 12px;
 }
 </style>
</head>
<body>
 <div id="difficulty-selector">
 Difficulty: 
 <button class="difficulty-btn active" onclick="setDifficulty('easy')">EASY</button>
 <button class="difficulty-btn" onclick="setDifficulty('normal')">NORMAL</button>
 <button class="difficulty-btn" onclick="setDifficulty('hard')">HARD</button>
 </div>
 
 <div id="gameInfo">
 <div>Score: <span id="score1">0</span> - <span id="score2">0</span></div>
 <div>Time: <span id="timer">90:00</span></div>
 </div>
 
 <div id="controls">
 👉 WASD: Move | Q: Power Shot | E: Precision | Mouse: AI follows cursor
 </div>
 
 <div id="gameContainer">
 <canvas id="gameCanvas" width="800" height="400"></canvas>
 </div>
 
 <div id="instructions">
 🏆 Use R to restart match | 🎯 Each difficulty rewrites AI behavior patterns
 </div>
 
 <div id="performance">
 FPS: <span id="fps">60</span> | AI Status: <span id="ai-status">Adaptive</span>
 </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Game constants
const FIELD_WIDTH = 800;
const FIELD_HEIGHT = 400;
const GOAL_WIDTH = 80;
const PLAYER_SIZE = 15;
const BALL_SIZE = 8;
const FRICTION = 0.98;

// Difficulty system
let currentDifficulty = 'normal';
const difficulties = {
 easy: {
 aiSpeed: 2.0,
 aiAccuracy: 0.6,
 aiAggression: 0.4,
 aiDecisionSpeed: 0.7,
 description: "Relaxed AI, easier shots"
 },
 normal: {
 aiSpeed: 2.5,
 aiAccuracy: 0.8,
 aiAggression: 0.7,
 aiDecisionSpeed: 1.0,
 description: "Balanced AI behavior"
 },
 hard: {
 aiSpeed: 3.2,
 aiAccuracy: 0.95,
 aiAggression: 0.9,
 aiDecisionSpeed: 1.3,
 description: "Advanced AI tactics"
 }
};

// Game state
let score = {team1: 0, team2: 0};
let gameTime = 90; // 90 seconds for quick matches
let gameRunning = true;
let lastAIUpdate = 0;

// Ball
const ball = {
 x: FIELD_WIDTH / 2,
 y: FIELD_HEIGHT / 2,
 vx: 0,
 vy: 0,
 mv: {x: 0, y: 0} // Memory for prediction
};

// Players
const player1 = {
 x: FIELD_WIDTH / 4,
 y: FIELD_HEIGHT / 2,
 vx: 0,
 vy: 0,
 speed: 4,
 color: '#ff4444',
 team: 1
};

const player2 = {
 x: 3 * FIELD_WIDTH / 4,
 y: FIELD_HEIGHT / 2,
 vx: 0,
 vy: 0,
 speed: 2.5,
 color: '#4444ff',
 team: 2,
 ai: true,
 type: 'striker'
};

const aiPlayer = {
 x: FIELD_WIDTH / 2,
 y: FIELD_HEIGHT / 4,
 vx: 0,
 vy: 0,
 speed: 2.5,
 color: '#6666ff',
 team: 2,
 ai: true,
 type: 'midfielder'
};

const players = [player1, player2, aiPlayer];

// Difficulty system
function setDifficulty(diff) {
 currentDifficulty = diff;
 document.querySelectorAll('.difficulty-btn').forEach(btn => btn.classList.remove('active'));
 document.querySelector(`.difficulty-btn:nth-child(${diff === 'easy' ? 1 : diff === 'normal' ? 2 : 3})`).classList.add('active');
 
 const settings = difficulties[diff];
 player2.speed = settings.aiSpeed;
 aiPlayer.speed = settings.aiSpeed * 0.8;
 document.getElementById('ai-status').textContent = settings.description;
}

// Input system
const keys = {};
document.addEventListener('keydown', (e) => {
 keys[e.key.toLowerCase()] = true;
 if (e.key.toLowerCase() === 'r' && !gameRunning) resetGame();
 e.preventDefault();
});

document.addEventListener('keyup', (e) => {
 keys[e.key.toLowerCase()] = false;
 e.preventDefault();
});

// AI intelligence system
function predictBallPosition(steps = 5) {
 let px = ball.x, py = ball.y;
 let pvx = ball.vx, pvy = ball.vy;
 
 for (let i = 0; i < steps; i++) {
 if (ball.vx === 0 && ball.vy === 0) break;
 px += pvx;
 py += pvy;
 pvx *= FRICTION;
 pvy *= FRICTION;
 
 // Boundary prediction
 if (px <= BALL_SIZE || px >= FIELD_WIDTH - BALL_SIZE) pvx = -pvx * 0.8;
 if (py <= BALL_SIZE || py >= FIELD_HEIGHT - BALL_SIZE) pvy = -pvy * 0.8;
 }
 
 return {x: px, y: py};
}

function getAIBehavior(player, difficulty) {
 const settings = difficulties[difficulty];
 const now = Date.now();
 
 // Tactical behavior based on role and difficulty
 if (player.type === 'striker') {
 // More aggressive attack behavior
 const ballPrediction = predictBallPosition(settings.aiDecisionSpeed * 8);
 let targetX, targetY;
 
 if (ball.x < FIELD_WIDTH * 0.3) {
 // Ball on defensive side - fall back
 targetX = Math.max(FIELD_WIDTH * 0.4, ball.x + 50);
 targetY = ball.y;
 } else {
 // Ball on offensive side - attack
 const goalCenter = {x: FIELD_WIDTH - 50, y: FIELD_HEIGHT / 2};
 const ballToGoal = Math.sqrt(Math.pow(goalCenter.x - ball.x, 2) + Math.pow(goalCenter.y - ball.y, 2));
 
 if (ballToGoal < 200) {
 // Close to goal - shoot
 targetX = Math.max(ball.x + 10, FIELD_WIDTH * 0.7);
 targetY = ball.y + (Math.random() - 0.5) * 40;
 } else {
 // Approach with angle
 targetX = ballPrediction.x + (goalCenter.x - ball.x) * 0.2;
 targetY = ballPrediction.y;
 }
 }
 
 return {
 tx: targetX,
 ty: targetY,
 force: settings.aiAggression * 5 + Math.random() * 2
 };
 } else {
 // Midfielder - defensive support and strategic positioning
 const targetX = ball.x > FIELD_WIDTH / 2 ? 
 FIELD_WIDTH * 0.6 : 
 ball.x < FIELD_WIDTH / 3 ? 
 FIELD_WIDTH * 0.5 : 
 ball.x + (FIELD_WIDTH / 2 - ball.x) * 0.3;
 
 const targetY = ball.y > FIELD_HEIGHT / 2 ? 
 ball.y - 30 : 
 ball.y + 30;
 
 return {
 tx: targetX,
 ty: targetY,
 force: settings.aiAggression * 3
 };
 }
}

function updatePlayerMovement() {
 // Player 1 - human controls
 const speed = keys['shift'] ? 6 : 4;
 if (keys['w']) player1.vy = -speed;
 else if (keys['s']) player1.vy = speed;
 else player1.vy = 0;
 
 if (keys['a']) player1.vx = -speed;
 else if (keys['d']) player1.vx = speed;
 else player1.vx = 0;
 
 // Boundary collision for player1
 player1.x += player1.vx;
 player1.y += player1.vy;
 player1.x = Math.max(PLAYER_SIZE, Math.min(FIELD_WIDTH - PLAYER_SIZE, player1.x));
 player1.y = Math.max(PLAYER_SIZE, Math.min(FIELD_HEIGHT - PLAYER_SIZE, player1.y));
 
 // AI Movement - difficulty-based
 const settings = difficulties[currentDifficulty];
 players.forEach(player => {
 if (player.ai) {
 const behavior = getAIBehavior(player, currentDifficulty);
 
 const dx = behavior.tx - player.x;
 const dy = behavior.ty - player.y;
 const distance = Math.sqrt(dx * dx + dy * dy);
 
 if (distance > 2) {
 const moveSpeed = settings.aiSpeed;
 player.vx = (dx / distance) * moveSpeed;
 player.vy = (dy / distance) * moveSpeed;
 }
 
 player.x += player.vx;
 player.y += player.vy;
 
 // Boundary collision
 player.x = Math.max(PLAYER_SIZE, Math.min(FIELD_WIDTH - PLAYER_SIZE, player.x));
 player.y = Math.max(PLAYER_SIZE, Math.min(FIELD_HEIGHT - PLAYER_SIZE, player.y));
 }
 });
}
